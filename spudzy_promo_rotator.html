<style>
  html, body { margin:0; padding:0; background:transparent; overflow:hidden; }
  #toast {
    position: absolute;
    left: 12px;
    bottom: 14px;
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 16px 26px 16px 14px;
    background: rgba(12, 10, 18, 0.88);
    border: 4px solid var(--accent, #8dff6a);
    border-radius: 4px;
    box-shadow: 0 0 20px 2px color-mix(in srgb, var(--accent, #8dff6a) 55%, transparent),
                inset 0 0 26px color-mix(in srgb, var(--accent, #8dff6a) 16%, transparent);
    transform: translateY(260px);
    visibility: hidden;
  }
  #toast.show { visibility: visible; animation: pop-in .5s steps(6) forwards; }
  #toast.hide { visibility: visible; animation: pop-out .45s steps(6) forwards; }
  @keyframes pop-in  { from { transform: translateY(260px); } to { transform: translateY(0); } }
  @keyframes pop-out { from { transform: translateY(0); } to { transform: translateY(260px); } }
  #toast img { width: 132px; height: 132px; image-rendering: pixelated; flex: none; }
  .txt { font-family: 'Press Start 2P', monospace; display: flex; flex-direction: column; gap: 12px; }
  .l1 { font-size: 17px; color: var(--accent, #fff); text-shadow: 0 0 9px color-mix(in srgb, var(--accent, #fff) 70%, transparent), 2px 2px 0 #000; }
  .l2 { font-size: 13px; color: #ffffff; text-shadow: 2px 2px 0 #000; line-height: 1.6; }
  .blink { animation: blink 1.1s steps(2) infinite; }
  @keyframes blink { 50% { opacity: 0.35; } }
</style>
</head>

  l2.innerHTML = "";
  const span = document.createElement("span");
  span.textContent = m.l2;
  if (m.l2.includes("!") || m.l2.includes(".gg")) span.classList.add("blink");
  l2.appendChild(span);
  toast.classList.remove("hide");
  toast.classList.add("show");
  setTimeout(() => {
    toast.classList.remove("show");
    toast.classList.add("hide");
  }, SHOW_S * 1000);
}

const preview = new URLSearchParams(location.search).has("preview");
setTimeout(showToast, preview ? 400 : INTERVAL_S * 1000);
setInterval(showToast, INTERVAL_S * 1000);
</script>
